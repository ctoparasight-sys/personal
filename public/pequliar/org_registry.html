oped pumpi"}, {"name": "RareConnect: Urea Cycle Disorders", "type": "disease_specific", "aso_amenability": "Preclinical", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift, splice-site", "mechanism_rationale": "Urea cycle disorders are a group of autosomal recessive (except X-linked OTC) enzyme deficiency disorders. Individually monogenic, but as a disease category they span multiple genes. All involve loss-of-function of urea cycle enzymes. Biallelic LoF (or hemizygous for OTC in males) cannot be corrected by ASOs. Note: For female OTC carriers with unfavorable X-inactivation, gene-unsilencing of the silenced wild-type X could theoretically help, but this is speculative.", "aso_drugs": "", "diseases": "Urea Cycle Disorders", "genes": "OTC, ASS1, ASL, CPS1, ARG1, NAGS", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/3f8b4ab0-9399-4bad-86aa-bf896c29b32e", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "A urea cycle disorder (UCD) is a genetic disorder caused by a mutation that results in a deficiency of one of the six enzymes in the urea cycle. These enzymes are responsible for removing ammonia from"}, {"name": "RareConnect: Usher syndrome", "type": "disease_specific", "aso_amenability": "Clinical trial", "aso_mechanisms": "pseudoexon-blocking, splice-switching", "mutations": "missense, nonsense, frameshift, splice-site, deep intronic", "mechanism_rationale": "Autosomal recessive hearing + vision loss. While biallelic LoF, USH2A (the most common Usher type II gene) has well-characterized deep intronic mutations creating pseudoexons (e.g., the PE40 pseudoexon). ASO QR-421a (now ultevursen) targets USH2A exon 13 for exon-skipping in patients with exon 13 mutations. Pseudoexon-blocking and exon-skipping ASOs are in clinical development for specific USH2A mutations.", "aso_drugs": "Ultevursen", "diseases": "Usher syndrome", "genes": "MYO7A, USH2A, CDH23, PCDH15, USH1C, USH1G, ADGRV1, WHRN, CLRN1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/7a7add54-a50f-47d9-b1ca-9b9b036bfe31", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Usher syndrome (US) is characterized by the association of sensorineural deafness (usually congenital) with retinitis pigmentosa and progressive vision loss."}, {"name": "RareConnect: VCP disease", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "gene-silencing", "mutations": "gain-of-function missense", "mechanism_rationale": "Autosomal dominant. Gain-of-function mutations in valosin-containing protein cause multisystem proteinopathy (inclusion body myopathy, Paget disease, FTD). Gene-silencing of mutant VCP.", "aso_drugs": "", "diseases": "VCP disease", "genes": "VCP", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/1dfa6a23-43e8-428c-9ee6-1cd047df5354", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "VCP Disease is a rare genetic disease, which can affect a patient's muscles, bones and brain.  There are less than 500 people currently diagnosed with this disease worldwide.  Leading researchers beli"}, {"name": "RareConnect: Vasculitis", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Vasculitis encompasses a heterogeneous group of inflammatory blood vessel diseases with autoimmune, infectious, and unknown etiologies. Not a monogenic disorder. Not amenable to ASO therapy.", "aso_drugs": "", "diseases": "Vasculitis", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/23efc1c3-30b4-466a-8e47-145a105dbe17", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Vasculitis (vas-kyu-LI-tis) is a condition that involves inflammation in the blood vessels and is a family of rare autoimmune diseases that can affect people of all ages. Vasculitis means inflammation"}, {"name": "RareConnect: Von Hippel-Lindau", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift, deletions", "mechanism_rationale": "Autosomal dominant tumor suppressor syndrome. Germline VHL loss-of-function with somatic second-hit causes hemangioblastomas and clear cell renal carcinoma via HIF accumulation. ASOs cannot restore tumor suppressor function. The disease requires surveillance and surgical management of tumors. HIF-targeted therapies exist for VHL-associated cancers.", "aso_drugs": "", "diseases": "Von Hippel-Lindau", "genes": "VHL", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/992d5936-2780-4bd2-92a6-e71872243445", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Von Hippel Lindau (VHL) is a rare genetic cancer syndrome, an alteration in the VHL-tumor-suppressor gene, which puts the individual at increased risk of developing tumors in various organs throughout"}, {"name": "RareConnect: WHIM Syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "gene-silencing", "mutations": "nonsense, frameshift (C-terminal truncation, gain-of-function)", "mechanism_rationale": "Autosomal dominant gain-of-function mutations in the C-terminus of CXCR4 cause impaired receptor desensitization and hyperactive CXCL12 signaling, leading to myelokathexis and immunodeficiency. ASO-mediated reduction of mutant CXCR4 expression could normalize receptor signaling. The CXCR4 antagonist mavorixafor is already in development, providing proof-of-concept for pathway modulation.", "aso_drugs": "", "diseases": "WHIM Syndrome", "genes": "CXCR4", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/4928842d-6e37-4af7-b3a1-d4d6a5005939", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Whim syndrome is the acronym for Warts, Hypogammag s that are "}, {"name": "RareConnect: White-Sutton Syndrome (WHSUS)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "upregulation-poison-exon, upregulation-antagonat", "mutations": "nonsense, frameshift, missense, de novo", "mechanism_rationale": "Caused by heterozygous de novo loss-of-function mutations in POGZ resulting in haploinsufficiency. One functional allele remains. ASO-mediated upregulation of the wild-type allele via poison exon blocking or NAT antagonism could restore POGZ protein levels and improve chromatin binding function, though the neurodevelopmental phenotype may limit postnatal therapeutic benefit.", "aso_drugs": "", "diseases": "White-Sutton Syndrome (WHSUS)", "genes": "POGZ", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/7ec60ccc-68bb-40eb-887f-88657c816d60", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "White-Sutton syndrome is a neurodevelopmental disorder characterized by delayed psychomotor development apparent in infancy and a characteristic constellation of dysmorphic facial features. Additional"}, {"name": "RareConnect: Williams Syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "contiguous gene deletion (1.5-1.8 Mb at 7q11.23)", "mechanism_rationale": "Williams syndrome is a contiguous gene deletion syndrome involving hemizygous deletion of 26-28 genes at 7q11.23. It is not a single-gene disorder. ASOs cannot compensate for the simultaneous haploinsufficiency of dozens of genes. The developmental phenotype (cardiovascular, neurocognitive, craniofacial) is established during fetal development.", "aso_drugs": "", "diseases": "Williams Syndrome", "genes": "ELN, GTF2I, GTF2IRD1, LIMK1, CLIP2", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/ee26c849-e413-49fc-b7dd-ad90596e0f2e", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Williams Syndrome (WS), also known as Williams–Beuren syndrome (WBS), is a disorder caused by a microdeletion in chromosome number 7. Most cases of Williams syndrome are not inherited but occur as ran"}, {"name": "RareConnect: Wolcott-Rallison syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift", "mechanism_rationale": "Autosomal recessive loss-of-function in EIF2AK3 (PERK). Biallelic LoF causes loss of kinase activity essential for beta-cell and bone development. ASOs cannot restore the missing kinase from two defective alleles. The pancreatic beta-cell and skeletal defects begin in utero.", "aso_drugs": "", "diseases": "Wolcott-Rallison syndrome", "genes": "EIF2AK3", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/7db447d2-8500-4c10-8b73-b621e565fd4b", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Wolcott-Rallison syndrome (WRS) is a very rare genetic disease, characterized by permanent neonatal diabetes mellitus (PNDM) with multiple epiphyseal dysplasia and other clinical manifestations, inclu"}, {"name": "RareConnect: X-linked Creatine Transporter Deficiency", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift, splice-site", "mechanism_rationale": "X-linked loss-of-function in SLC6A8 encoding the creatine transporter. Hemizygous males have no functional transporter. ASOs cannot restore the missing transporter. The disease causes creatine deficiency in brain and muscle that cannot be corrected at the RNA level.", "aso_drugs": "", "diseases": "X-linked Creatine Transporter Deficiency", "genes": "SLC6A8", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/98f3f530-26dc-40db-8533-6d7268e616ca", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "X-linked creatine transporte var badgeClass = {
  "Approved ASO": "badge-approved",
  "Clinical trial": "badge-clinical",
  "Preclinical": "badge-preclinical",
  "Predicted amenable": "badge-predicted",
  "Unknown": "badge-unknown",
};

var amenabilityOrder = ["Approved ASO", "Clinical trial", "Preclinical", "Predicted amenable", "Unknown"];

function amenabilityFormatter(cell) {
  var v = cell.getValue();
  var cls = badgeClass[v] || "badge-unknown";
  return '<span class="badge ' + cls + '">' + v + '</span>';
}

function linkFormatter(cell) {
  var v = cell.getValue();
  if (!v) return "";
  var display = v.replace(/^https?:\/\//, "").replace(/\/$/, "");
  if (display.length > 30) display = display.substring(0, 30) + "...";
  return '<a href="' + v + '" target="_blank" rel="noopener">' + display + '</a>';
}

function emailFormatter(cell) {
  var v = cell.getValue();
  if (!v) return "";
  return '<a href="mailto:' + v + '">' + v + '</a>';
}

function updateRowCount() {
  var count = table.getDataCount("active");
  document.getElementById("row-count").textContent = count + " of " + tableData.length + " organizations shown";
}

function clearFilters() {
  table.clearHeaderFilter();
}

var table = new Tabulator("#table", {
  data: tableData,
  layout: "fitDataStretch",
  pagination: false,
  movableColumns: true,
  resizableColumns: true,
  initialSort: [{column: "aso_amenability", dir: "asc"}],
  columns: [
    {
      title: "Name", field: "name", headerFilter: "input",
      minWidth: 200, frozen: true,
      headerFilterPlaceholder: "Search...",
    },
    {
      title: "Type", field: "type", headerFilter: "list",
      headerFilterParams: {valuesLookup: true, clearable: true, sort: "asc"},
      minWidth: 120,
    },
    {
      title: "ASO Amenability", field: "aso_amenability",
      formatter: amenabilityFormatter,
      headerFilter: "list",
      headerFilterParams: {values: {"": "All", "Approved ASO": "Approved ASO", "Clinical trial": "Clinical trial", "Preclinical": "Preclinical", "Predicted amenable": "Predicted amenable", "Unknown": "Unknown"}, clearable: true},
      sorter: function(a, b) {
        return amenabilityOrder.indexOf(a) - amenabilityOrder.indexOf(b);
      },
      minWidth: 150,
    },
    {
      title: "ASO Mechanisms", field: "aso_mechanisms", headerFilter: "input",
      headerFilterPlaceholder: "Search...",
      minWidth: 160,
    },
    {
      title: "Mutations", field: "mutations", headerFilter: "input",
      headerFilterPlaceholder: "Search...",
      minWidth: 180,
    },
    {
      title: "Rationale", field: "mechanism_rationale", headerFilter: "input",
      headerFilterPlaceholder: "Search...",
      minWidth: 250,
    },
    {
      title: "ASO Drugs", field: "aso_drugs", headerFilter: "input",
      headerFilterPlaceholder: "Search...",
      minWidth: 160,
    },
    {
      title: "Diseases", field: "diseases", headerFilter: "input",
      headerFilterPlaceholder: "Search...",
      minWidth: 200,
    },
    {
      title: "Genes", field: "genes", headerFilter: "input",
      headerFilterPlaceholder: "Search...",
      minWidth: 100,
    },
    {
      title: "Region", field: "region", headerFilter: "list",
      headerFilterParams: {valuesLookup: true, clearable: true, sort: "asc"},
      minWidth: 80,
    },
    {
      title: "Country", field: "country", headerFilter: "list",
      headerFilterParams: {valuesLookup: true, clearable: true, sort: "asc"},
      minWidth: 80,
    },
    {
      title: "Website", field: "website", formatter: linkFormatter,
      minWidth: 180,
    },
    {
      title: "Email", field: "email", formatter: emailFormatter,
      minWidth: 160,
    },
    {
      title: "Trials", field: "aso_trials", sorter: "number",
      hozAlign: "center", minWidth: 60,
    },
    {
      title: "Source", field: "source", headerFilter: "list",
      headerFilterParams: {valuesLookup: true, clearable: true, sort: "asc"},
      minWidth: 100,
    },
    {
      title: "Notes", field: "notes", headerFilter: "input",
      headerFilterPlaceholder: "Search...",
      minWidth: 200,
    },
  ],

  renderComplete: updateRowCount,
});

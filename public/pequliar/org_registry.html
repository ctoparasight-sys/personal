a029-332ae42a5bb8", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Acanthamoeba keratitis is a rare corneal infection due to the protozoan Acanthamoeba that generally occurs in contact lens wearers and that is characterized by severe ocular pain, blepharospasm, photo"}, {"name": "RareConnect: Achalasia", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Idiopathic achalasia is a complex, multifactorial disorder of esophageal motility. While rare monogenic syndromes include achalasia as a feature (e.g., Triple A syndrome/AAAS gene), the RareConnect community refers to the common idiopathic form, which has polygenic susceptibility and autoimmune/inflammatory pathogenesis. Not targetable by ASOs.", "aso_drugs": "", "diseases": "Achalasia", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/48592034-62da-493e-a673-628ddc301f75", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Achalasia is a rare disorder of the esophagus, the tube that carries food from the throat to the stomach. It is characterized by impaired ability to push food down toward the stomach (peristalsis), fa"}, {"name": "RareConnect: Acromegaly", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "95% of acromegaly cases are caused by sporadic pituitary adenomas (somatic tumor mutations). While rare familial forms involve germline AIP or GPR101 mutations, acromegaly as a RareConnect community primarily represents the sporadic tumor-driven disease. Not a monogenic germline disorder amenable to ASO therapy.", "aso_drugs": "", "diseases": "Acromegaly", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/b3cc078d-fd43-4db8-bed6-205409143d76", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Acromegaly is an acquired disorder related to excessive production of growth hormone (GH) and characterized by progressive somatic disfigurement (mainly involving the face and extremities) and systemi"}, {"name": "RareConnect: Acute Macular Neuroretinopathy (AMN)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Acquired vascular/inflammatory condition of the retina, most commonly associated with viral infections, vaccination, or oral contraceptive use. Not a monogenic disorder. No genetic cause identified.", "aso_drugs": "", "diseases": "Acute Macular Neuroretinopathy (AMN)", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/bcef4454-b52d-4bde-be2c-9b9736176c4e", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Acute Macular Neuroretinopathy (AMN) is characterized by the sudden-onset of one or more paracentral scotomas, usually affecting only one eye but rarely bilateral, in the absence of any other ocular o"}, {"name": "RareConnect: Acute Necrotizing Encephalopathy (ANE)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "gene-silencing", "mutations": "gain-of-function", "mechanism_rationale": "ANE1 is caused by autosomal dominant missense mutations in RANBP2 (40% penetrant) that alter nucleocytoplasmic transport and trigger CNS-restricted cytokine storms in response to viral infection. The mutation causes a gain-of-function/neomorphic effect. ASO-mediated silencing of the mutant RANBP2 allele could reduce the pathological hyper-inflammatory response. However, RANBP2 is essential for normal cell function, so allele-specific targeting would be needed, making this challenging.", "aso_drugs": "", "diseases": "Acute Necrotizing Encephalopathy (ANE)", "genes": "RANBP2", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/7af721bc-eecd-42a3-b82b-a2c2fca69b03", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Acute Necrotizing Encephalopathy ANE (or Genetic ANE1) is also known as Infection Induced Acute Encephalopathy (IIAE3), OMIM No. 608033. It is also known as ADANE and ANEC. Orpha No. 88619.

isease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "loss-of-function", "mechanism_rationale": "X-linked recessive disorder caused by loss-of-function mutations in SLC16A2 (MCT8), a thyroid hormone transporter. In affected males, the single X-linked copy is mutated. ASOs cannot restore a non-functional transporter protein. There is no second allele to upregulate.", "aso_drugs": "", "diseases": "Allan Herndon Dudley Syndrome MCT8", "genes": "SLC16A2", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/9c73b0e3-7a4f-4eb5-a228-d616a147f220", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Allan-Herndon- Dudley (AHDS) is caused by a mutation of the MCT8 gene which is responsible for the transport of Thyroid Hormones to the brain. It is an X-link inherited mutation that only affects male"}, {"name": "RareConnect: Alpha mannosidosis", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "loss-of-function", "mechanism_rationale": "Autosomal recessive lysosomal storage disease caused by biallelic loss-of-function mutations in MAN2B1. Both copies are defective. ASOs cannot restore enzyme activity. Enzyme replacement therapy exists.", "aso_drugs": "", "diseases": "Alpha mannosidosis", "genes": "MAN2B1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/23479480-f7c5-49d0-bdf9-a7a94473ca81", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Alpha-mannosidosis is a rare genetic condition characterized by an inability to properly break down certain groups of complex sugars in the body’s cells. The accumulation of sugars affects many of the"}, {"name": "RareConnect: Alpha-1-antitrypsin deficiency", "type": "disease_specific", "aso_amenability": "Clinical trial", "aso_mechanisms": "gene-silencing", "mutations": "gain-of-function, loss-of-function", "mechanism_rationale": "The Z allele (Glu342Lys) of SERPINA1 causes both gain-of-function toxicity (misfolded protein accumulates in hepatocyte ER causing liver disease) and loss-of-function (reduced circulating AAT causing emphysema). For the liver disease component, ASO-mediated silencing of the toxic mutant SERPINA1 mRNA in hepatocytes can reduce toxic protein aggregation. This is a validated ASO target -- several ASO/siRNA programs are in clinical development for AAT-related liver disease.", "aso_drugs": "", "diseases": "Alpha-1-antitrypsin deficiency", "genes": "SERPINA1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/4328d842-7ee2-4f4f-afc0-7c763b066ea3", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Alpha-1-antitrypsin deficiency is based on a common genetic disorder. The disease manifests itself in the lungs in the form of chronic obstructive bronchitis with pulmonary emphysema (COPD), as well a"}, {"name": "RareConnect: Alport Syndrome", "type": "disease_specific", "aso_amenability": "Preclinical", "aso_mechanisms": "exon-skipping, splice-switching", "mutations": "loss-of-function", "mechanism_rationale": "X-linked (COL4A5, 85%) or autosomal recessive (COL4A3/COL4A4, 15%) disorder caused by loss-of-function mutations in type IV collagen genes. For certain COL4A5 mutations (particularly in-frame deletable exons), exon-skipping ASOs could restore a partially functional collagen chain, analogous to DMD exon-skipping. Splice-switching may also redirect aberrant splicing caused by splice-site mutations.", "aso_drugs": "", "diseases": "Alport Syndrome", "genes": "COL4A5, COL4A3, COL4A4", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/450a110a-0406-4adf-a761-52f115c29fdb", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Alport syndrome is a genetic condition characterized by kidney disease, hearing loss, and eye abnormalities. People with Alport syndrome experience progressive loss of kidney function. "}, {"name": "RareConnect: Alstrom Syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "loss-of-function", "mechanism_rationale": "Autosomal recessive ciliopathy caused by biallelic loss-of-function (mostly truncating/frameshift) mutations in ALMS1. Both copies are defective. ASOs cannot restore a 4,169-amino-acid structural protein from two null alleles.", "aso_drugs": "", "diseases": "Alstrom Syndrome", "genes": "ALMS1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/42f7f3b8-1b39-42d1-bae3-a5e32a7b3ca7", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Alström Syndrome is a Ciliopathy, it causes childhood blindness, hearing loss, dilated cardiomyopathy, obesity, type two diabetes, kidney failure and many associated problems.

Source: Participating patient organizations visible below"}, {"name": "RareConnect: Amyloidosis", "type": "disease_specific", "aso_amenability": "Approved ASO", "aso_mechanisms": "gene-silencing", "mutations": "gain-of-function", "mechanism_rationale": "Hereditary transthyretin amyloidosis (hATTR) is caused by autosomal dominant mutations in TTR that promote protein misfolding and amyloid deposition. This is a proven ASO target -- inotersen and eplontersen are FDA-approved ASOs that silence TTR mRNA in hepatocytes, reducing amyloid formation. Note: other forms of amyloidosis (AL, AA) are not monogenic and are not ASO-amenable.", "aso_drugs": "Eplontersen (Wainua), Inotersen (Tegsedi)", "diseases": "Amyloidosis", "genes": "TTR", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/ae43b883-d65e-466e-968e-50b7c11cc0ae", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Amyloidosis is a rare systemic disease caused by deposits of amyloid protein fibrils in one or more organs, causing the organs to malfunction. There are three main types: Primary Amyloidosis (AL), Sec"}, {"name": "RareConnect: Amyotrophic Lateral Sclerosis (ALS)", "type": "disease_specific", "aso_amenability": "Approved ASO", "aso_mechanisms": "gene-silencing, gene-silencing-toxic-rna", "mutations": "gain-of-function, repeat expansion", "mechanism_rationale": "ALS has multiple monogenic forms. SOD1-ALS: gain-of-function mutations; tofersen (ASO) is FDA-approved for SOD1-ALS via RNase H knockdown. C9orf72-ALS: GGGGCC hexanucleotide repeat expansion produces toxic RNA foci and dipeptide repeats; ASOs targeting sense/antisense transcripts are in clinical trials (gene-silencing-toxic-rna). FUS/TARDBP mutations also produce toxic gain-of-function proteins targetable by gene-silencing ASOs. Note: ~90% of ALS is sporadic without identified monogenic cause.", "aso_drugs": "Tofersen (Qalsody)", "diseases": "Amyotrophic Lateral Sclerosis (ALS)", "genes": "SOD1, C9orf72, FUS, TARDBP", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/cff0eab6-5c8c-42de-b673-070343fd2c7a", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "A neurodegenerative disease characterized by progressive muscular paralysis reflecting degeneration of motor neurons in the primary motor cortex, corticospinal tracts, brainstem and spinal cord. Sourc"}, {"name": "RareConnect: Anorectal malformations", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Heterogeneous group of congenital structural defects. While some syndromic forms have monogenic causes (SALL1, MNX1, CHD7), most are multifactorial with complex genetics. Only ~35% of syndromic cases have identifiable monogenic causes. The primary pathology is structural -- surgical correction is the treatment. ASOs cannot correct congenital structural malformations.", "aso_drugs": "", "diseases": "Anorectal malformations", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/1d96ba0e-355b-4ed2-972a-43d16d127091", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Anorectal malformations (ARM) comprise a wide spectrum of malformations involving the anus and rectum as well as the urinary and genital tracts. Source: [orphanet](https://www.orpha.net/consor/cgi-bin"}, {"name": "RareConnect: Aortic dissection", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "loss-of-function", "mechanism_rationale": "Hereditary thoracic aortic aneurysm/dissection has multiple monogenic causes (FBN1 in Marfan, TGFBR1/2 in Loeys-Dietz, COL3A1 in vascular EDS), all autosomal dominant with loss-of-function or dominant-negative effects on structural connective tissue proteins. The pathology is structural weakening of the aortic wall. ASOs cannot repair or replace defective structural extracellular matrix proteins. Surgical intervention is the mainstay.", "aso_drugs": "", "diseases": "Aortic dissection", "genes": "FBN1, TGFBR1, TGFBR2, COL3A1, SMAD3, ACTA2, MYH11", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/ce12497c-d006-412a-add2-03f4a199903b", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Aortic Dissection is a life threatening rare disease where the inner layer of the aorta (intima) has ruptured and the blood is now also flowing between the inner and outer layer of the aorta (like a d"}, {"name": "RareConnect: Apert Syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "gain-of-function", "mechanism_rationale": "Caused by heterozygous gain-of-function mutations in FGFR2 (Ser252Trp or Pro253Arg in >98% of cases), leading to constitutively active FGF receptor signaling and premature cranial suture fusion. While gene-silencing ASOs could theoretically reduce FGFR2 signaling, the craniosynostosis and syndactyly are structural developmental defects that occur prenatally. ASO treatment would need to be administered in utero to prevent the malformations, making this impractical.", "aso_drugs": "", "diseases": "Apert Syndrome", "genes": "FGFR2", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/f3d5db4d-6dc9-4712-979b-8f6362d5895c", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Apert syndrome is a complex condition caused by premature fusion, or early closure, of one or more of the sutures (specialized joints between skull bones that expand during normal brain growth) that s"}, {"name": "RareConnect: Arachnoiditis", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Primarily an acquired inflammatory/fibrotic condition of the arachnoid membrane caused by infections, trauma, spinal interventions, or chemical irritants. Not a monogenic disorder. Rare genetic predisposition through connective tissue disorders but not directly caused by single gene mutations.", "aso_drugs": "", "diseases": "Arachnoiditis", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/71752c6c-0ea5-4c07-b412-50e1338886e7", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Arachnoiditis is an inflammatory condition of the arachnoid mater or 'arachnoid', one of the membranes known as meninges that surround and protect the nerves of the central nervous system, including t"}, {"name": "RareConnect: Arrhythmogenic Right Ventricular Cardiomyopathy", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "loss-of-function", "mechanism_rationale": "Autosomal dominant disorder caused by loss-of-function mutations in desmosomal genes (PKP2 most common at 30-40%). Haploinsufficiency of structural desmosomal proteins leads to fibrofatty replacement of myocardium. While upregulation of the remaining allele is theoretically possible, the cardiac delivery challenge and the structural nature of desmosomal proteins make ASO approaches impractical. Gene therapy (AAV-PKP2) is being pursued instead.", "aso_drugs": "", "diseases": "Arrhythmogenic Right Ventricular Cardiomyopathy", "genes": "PKP2, DSP, DSG2, DSC2, JUP", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/53da9a70-081d-473e-8183-037ec71d0614", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "ARVC (Arrhythmogenic Right Ventricular Cardiomyopathy) or ARVD (\"D\" for dysplasia) is a mostly hereditary disease of the heart, in which heart's muscle cells are replaced by fat and connective tissue."}, {"name": "RareConnect: Atypical Hemolytic Uremic Syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "loss-of-function", "mechanism_rationale": "Genetically heterogeneous complement dysregulation disorder. Multiple genes involved (CFH most common), each with loss-of-function mutations leading to uncontrolled complement activation. Biallelic or compound heterozygous in many cases. The pathology requires complement restoration, not further suppression. Complement inhibitors (eculizumab) are the standard treatment. ASOs are not suited to restore deficient complement regulators.", "aso_drugs": "", "diseases": "Atypical Hemolytic Uremic Syndrome", "genes": "CFH, CFI, CFB, C3, CD46, THBD, DGKE", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/7f0a9526-4dcd-4883-9ede-f2b29174245e", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Atypical Hemolytic Uremic Syndrome (aHUS) is a thrombotic microangiopathy (TMA) resulting from dysregulation of the Complement System."}, {"name": "RareConnect: Au-Kline syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "upregulation-poison-exon, upregulation-antagonat", "mutations": "loss-of-function", "mechanism_rationale": "Autosomal dominant disorder caused by haploinsufficiency of HNRNPK (heterogeneous nuclear ribonuclear protein K), which is involved in chromatin remodeling, transcription, and mRNA splicing. One functional copy remains but is insufficient. ASO-mediated upregulation of the remaining wild-type allele via poison exon blocking or NAT antagonism could potentially increase HNRNPK protein levels.", "aso_drugs": "", "diseases": "Au-Kline syndrome", "genes": "HNRNPK", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/40569c7a-a0f5-4ad1-ab81-cb096e56be56", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Au-Kline syndrome is a condition characterized by intellectual disability, facial dysmorphism, cardiac defects, renal malformation, and connective tissue and skeletal abnormalities. Dysmorphic feature"}, {"name": "RareConnect: Auto-brewery syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Not a monogenic disorder. Caused by overgrowth of fermenting microorganisms (yeast/bacteria) in the gut, often secondary to antibiotic use, immune compromise, or gut dysbiosis. Genetic polymorphisms in alcohol metabolism enzymes (ADH, ALDH2) may contribute to susceptibility but are not causative.", "aso_drugs": "", "diseases": "Auto-brewery syndrome", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/82a1afd7-42b2-4564-aa84-015f4882fc7b", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Auto-brewery syndrome or gut fermentation syndrome is a condition in which ethanol is produced through endogenous fermentation by fungi or bacteria in the gastrointestinal (GI) system. Patients with a"}, {"name": "RareConnect: Autoimmune lymphoproliferative syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "loss-of-function", "mechanism_rationale": "Caused by loss-of-function mutations in FAS (75% of cases) or related apoptosis pathway genes, impairing lymphocyte apoptosis. While FAS is the dominant cause and mutations are heterozygous (dominant-negative), the disease mechanism is loss of apoptotic signaling. ASOs cannot restore defective FAS-mediated apoptosis. The remaining functional allele's product is blocked by the dominant-negative mutant protein, so upregulation would not help.", "aso_drugs": "", "diseases": "Autoimmune lymphoproliferative syndrome", "genes": "FAS, FASLG, CASP10, CASP8", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/80f350cd-fd63-4e2d-b653-59f086d5b646", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Autoimmune lymphoproliferative syndrome (ALPS), also known as Canale-Smith syndrome, is a form of lymphoproliferative disorder (LPDs). It affects lymphocyte apoptosis."}, {"name": "RareConnect: Autosomal recessive spastic ataxia of Charlevoix-Saguenay (ARSACS)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "loss-of-function", "mechanism_rationale": "Autosomal recessive disorder caused by biallelic loss-of-function mutations in SACS, encoding sacsin (a 520-kDa protein with chaperone functions). Both copies are defective. ASOs cannot restore a massive multidomain protein from two null alleles. The protein is too large even for standard gene therapy approaches.", "aso_drugs": "", "diseases": "Autosomal recessive spastic ataxia of Charlevoix-Saguenay (ARSACS)", "genes": "SACS", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/3756624e-d3b5-47ae-9052-71ff75848608", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Autosomal Recessive Spatic Ataxia of Charlevoix-Saguenay is a debilitating and hereditary progressive  childhood neurological disorder. Symptoms generally appear between the ages of 2 and 5 years old."}, {"name": "RareConnect: Axenfeld syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "loss-of-function", "mechanism_rationale": "Autosomal dominant anterior segment dysgenesis caused by haploinsufficiency of FOXC1 or PITX2 transcription factors. While upregulation approaches are theoretically possible, the primary pathology is a congenital developmental defect of the eye that occurs during embryogenesis. ASO treatment postnatally cannot correct already-formed structural malformations. The main clinical concern (glaucoma) requires surgical/medical management.", "aso_drugs": "", "diseases": "Axenfeld syndrome", "genes": "FOXC1, PITX2", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/81c57802-e4f3-4d68-9696-f44a al) that form prenatally. Post-natal ASO treatment cannot correct established structural defects. Additionally, HRAS is essential for normal cell function, making allele-specific targeting necessary but extremely challenging.", "aso_drugs": "", "diseases": "Costello syndrome", "genes": "HRAS", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/01e30c71-d6fe-45c6-a316-ce228e9a0cdc", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Costello syndrome (CS) is a rare multisystemic disorder characterized by failure to thrive, short stature, developmental delay or intellectual disability, joint laxity, soft skin, and distinctive faci"}, {"name": "RareConnect: Cryoglobulinemia", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Most commonly secondary to hepatitis C virus infection, autoimmune diseases, or lymphoproliferative disorders. Not a monogenic disorder. Rare cases associated with COPA gene mutations represent a distinct monogenic entity (COPA syndrome) rather than typical cryoglobulinemia.", "aso_drugs": "", "diseases": "Cryoglobulinemia", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/b141041f-c8df-4878-a391-68b751fb4291", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Cryoglobulinemia is a disease defined by the presence of cryoglobulins; which are proteins (also called immunoglobulins or antibodies) that become thick in cold temperatures. This process can restrict"}, {"name": "RareConnect: Cryopyrin Associated Periodic Syndromes", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "gene-silencing", "mutations": "gain-of-function missense", "mechanism_rationale": "Gain-of-function in NLRP3 causes constitutive inflammasome activation. Gene-silencing to reduce NLRP3 expression.", "aso_drugs": "", "diseases": "Cryopyrin Associated Periodic Syndromes", "genes": "NLRP3", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/f268294c-951a-4159-a8ec-6534317807f8", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Cryopyrinopathies (CAPS) are a group of rare autoinflammatory diseases that includes familial cold autoinflammatory syndrome, Muckle–Wells syndrome and chronic infantile neurologic cutaneous articular"}, {"name": "RareConnect: Cutis marmorata telangiectatica congenita", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Sporadic vascular skin condition, likely caused by somatic mosaic mutations (GNA11, ARL6IP6 suggested). Not inherited in a traditional monogenic pattern. Congenital structural vascular malformation that resolves spontaneously in most cases. Not amenable to ASO therapy.", "aso_drugs": "", "diseases": "Cutis marmorata telangiectatica congenita", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/c4741cd2-fb9a-4f71-a7cb-3d8c2e07ab34", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "CMTC is a condition in which dilated blood vessels can be seen through the skin. \"Cutis marmorata\" means marbled skin. \"Telangiectatica\" refers to abnormal blood vessels and \"congenita\" to its congeni"}, {"name": "RareConnect: Cystinosis", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "loss-of-function", "mechanism_rationale": "Autosomal recessive lysosomal storage disorder caused by biallelic loss-of-function mutations in CTNS (cystinosin, the lysosomal cystine transporter). Both copies are defective. ASOs cannot restore transporter function from two null alleles. Cysteamine therapy is the current treatment.", "aso_drugs": "", "diseases": "Cystinosis", "genes": "CTNS", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/af4d8c47-c11e-41d1-a3d9-b1283c44775d", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Cystinosis is a lysosomal storage disease characterized by the abnormal accumulation of the amino acid cystine.

Source: Participating patient organizations visible below"}, {"name": "RareConnect: DLG4-Related Disorder (SHINE)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "upregulation-poison-exon, upregulation-antagonat", "mutations": "loss-of-function", "mechanism_rationale": "Autosomal dominant neurodevelopmental disorder caused by heterozygous pathogenic variants in DLG4 (encoding PSD-95), a critical synaptic scaffolding protein. Haploinsufficiency mechanism. One functional copy remains but is insufficient for normal brain development. ASO-mediated upregulation of the remaining wild-type allele via poison exon blocking or NAT antagonism could restore PSD-95 levels at synapses.", "aso_drugs": "", "diseases": "DLG4-Related Disorder (SHINE)", "genes": "DLG4", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/c7cfc9c9-cdde-4fe9-8ff2-32c12c5507f9", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Mutations in DLG4 gene are described to cause DLG4 – Related Disorder. DLG4-Related Disorder is a rare, genetic condition that has been associated with intellectual disability and autism spectrum diso"}, {"name": "RareConnect: DNM1 epileptic encephalopathy", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "gene-silencing", "mutations": "gain-of-function", "mechanism_rationale": "Autosomal dominant developmental and epileptic encephalopathy (DEE31A) caused by de novo heterozygous missense mutations in DNM1 (dynamin-1). Mutations act in a dominant-negative manner, impairing synaptic vesicle endocytosis. Allele-specific ASO silencing of the mutant DNM1 allele could reduce the dominant-negative effect while preserving wild-type dynamin-1 function. The autosomal recessive form (DEE31B) would not be ASO-amenable.", "aso_drugs": "", "diseases": "DNM1 epileptic encephalopathy", "genes": "DNM1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/ ing (RNase H knockdown of the transcript) and toxic-RNA-targeting approaches are applicable.", "aso_drugs": "", "diseases": "Dentatorubral pallidoluysian atrophy (DRPLA)", "genes": "ATN1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/a313893f-629e-4377-b677-ff15d8f20061", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Dentatorubral pallidoluysian atrophy (DRPLA) is a rare subtype of type I autosomal dominant cerebellar ataxia (ADCA type I; see this term). It is characterized by involuntary movements, ataxia, epilep"}, {"name": "RareConnect: Down Syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "gene-silencing", "mutations": "structural/chromosomal", "mechanism_rationale": "Caused by trisomy 21 (three copies of chromosome 21). While not a monogenic disorder, ASO-mediated silencing of specific overexpressed genes on chromosome 21 is being explored. ASOs targeting APP could reduce Alzheimer's-related neurodegeneration in Down syndrome. ASOs targeting DYRK1A overexpression could improve cognitive function. These represent gene-specific dosage correction rather than treating the chromosomal abnormality itself. Classifying as conditionally ASO-amenable for specific gene targets.", "aso_drugs": "", "diseases": "Down Syndrome", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/2089b52e-ee0f-4718-ac42-9c81c290f12e", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Down Syndrome is a genetic condition where individuals affected have an extra chromosome, and specifically they have 3 copies of chromosome 21\. The most diffuse form of Down Syndrome is also known as"}, {"name": "RareConnect: Dravet Syndrome", "type": "disease_specific", "aso_amenability": "Clinical trial", "aso_mechanisms": "upregulation-poison-exon", "mutations": "loss-of-function", "mechanism_rationale": "Autosomal dominant severe epileptic encephalopathy caused by heterozygous loss-of-function mutations in SCN1A (Nav1.1 sodium channel). Haploinsufficiency reduces inhibitory interneuron excitability. The remaining wild-type SCN1A allele contains a poison exon (exon 20N) that triggers NMD. ASOs blocking this poison exon can upregulate SCN1A expression from the functional allele. This is an active clinical program -- Stoke Therapeutics' STK-001 (now in Phase 3 trials) uses this exact mechanism. This is one of the most validated ASO targets for upregulation.", "aso_drugs": "", "diseases": "Dravet Syndrome", "genes": "SCN1A", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/a51d0359-ef11-4504-9d8e-e037e3174a0d", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Dravet Syndrome is one of the most catastrophic epilepsies and is a rare neurological condition causing severe, difficult to control seizures alongside developmental delay.

: "Fibromuscular dysplasia (FMD) is a disease of the artery wall, without atherosclerosis (cholesterol deposits) or inflammation present. Sometimes this can lead to an arterial stenosis (narrowing), a di"}, {"name": "RareConnect: Fibrosing Mediastinitis (FM)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Acquired fibrotic condition of the mediastinum, most commonly triggered by Histoplasma capsulatum infection in a genetically susceptible host (HLA-A2 association). Not a monogenic disorder. Pathology involves excessive fibroblast proliferation in response to infection. Treatment is surgical/interventional.", "aso_drugs": "", "diseases": "Fibrosing Mediastinitis (FM)", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/e120381a-bc19-4dd3-b91c-41c41817ad90", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Fibrosing mediastinitis is a condition that affects the area between the lungs (mediastinum) which contains the heart, large blood vessels, windpipe (trachea), esophagus, and lymph nodes. People with "}, {"name": "RareConnect: Fragile X associated primary ovarian insufficiency", "type": "disease_specific", "aso_amenability": "Preclinical", "aso_mechanisms": "gene-silencing-toxic-rna", "mutations": "repeat expansion", "mechanism_rationale": "Caused by CGG trinucleotide repeat expansion (55-200 repeats, premutation range) in the 5' UTR of FMR1. The expanded premutation mRNA is toxic through an RNA gain-of-function mechanism -- elevated FMR1 mRNA levels form toxic RNA aggregates and/or undergo repeat-associated non-AUG (RAN) translation producing toxic FMRpolyG protein. ASOs targeting the toxic expanded FMR1 mRNA could reduce RNA toxicity. However, the ovarian damage may be largely developmental/irreversible by the time of diagnosis, limiting therapeutic window.", "aso_drugs": "", "diseases": "Fragile X associated primary ovarian insufficiency", "genes": "FMR1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/0d22498f-21d9-4f4f-bb6f-06a0fce63fb9", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Fragile X associated primary ovarian insufficiency (FXPOI) is a condition in which the ovaries are not functioning to full capacity in a woman who carries a premutation in the FMR1 gene.  FXPOI is a c"}, {"name": "RareConnect: Frontotemporal dementia (FTD)", "type": "disease_specific", "aso_amenability": "Clinical trial", "aso_mechanisms": "gene-silencing, upregulation-poison-exon, gene-silencing-toxic-rna", "mutations": "gain-of-function missense (MAPT), frameshift/nonsense (GRN), repeat expansion GGGGCC (C9orf72)", "mechanism_rationale": "MAPT: gene-silencing. GRN: upregulation. C9orf72: gene-silencing-toxic-rna.", "aso_drugs": "", "diseases": "Frontotemporal dementia (FTD)", "genes": "MAPT, GRN, C9orf72", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/911b6f43-57a4-474a-a849-ae2717c9c6ff", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "FTD is the most common form of dementia for people under age 60. It represents a group of brain disorders caused by degeneration of the frontal and/or temporal lobes of the brain. FTD is also frequent"}, {"name": "RareConnect: GNE myopathy", "type": "disease_specific", "aso_amenability": "Preclinical", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, deletion, compound heterozygous", "mechanism_rationale": "Autosomal recessive loss-of-function enzyme deficiency (UDP-N-acetylglucosamine 2-epimerase/N-acetylmannosamine kinase). Both alleles carry loss-of-function mutations causing impaired sialic acid biosynthesis. ASOs cannot restore a missing enzyme in a recessive LoF context; enzyme replacement or gene therapy would be needed.", "aso_drugs": "", "diseases": "GNE myopathy", "genes": "GNE", "region": "Global", "country": "", egeneration with Brain Iron Accumulation (NBIA) comprises a group of rare, genetic neurodegenerative disorders. Common features among all individuals with NBIA include iron accumulation in a par"}, {"name": "RareConnect: Neurofibromatosis type 1", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "upregulation-poison-exon, upregulation-antagonat", "mutations": "missense, nonsense, splice site, deletions (whole gene and intragenic), insertions", "mechanism_rationale": "Autosomal dominant tumor predisposition syndrome caused by heterozygous LoF mutations in NF1 (neurofibromin, a RAS-GAP tumor suppressor). NF1 haploinsufficiency causes many non-tumor features (learning disabilities, skeletal abnormalities). Upregulating the remaining functional allele could increase neurofibromin levels and improve RAS pathway regulation. However, tumors arise from biallelic loss (second somatic hit), which ASOs cannot prevent. ASO benefit would primarily address haploinsufficiency-driven non-tumor manifestations.", "aso_drugs": "", "diseases": "Neurofibromatosis type 1", "genes": "NF1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/f8451369-4418-481f-bff1-3fef498386bc", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Neurofibromatosis type 1 (NF1) is a clinically heterogeneous, neurocutaneous, genetic disorder characterized by café-au-lait spots, iris Lisch nodules, axillary and inguinal freckling, and multiple ne"}, {"name": "RareConnect: Neurofibromatosis type 2 and Schwannomatosis", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "truncating, missense, splice site (heterozygous germline + somatic second hit)", "mechanism_rationale": "Tumor predisposition syndromes caused by heterozygous germline LoF in tumor suppressors (NF2/merlin, SMARCB1, LZTR1). Tumors arise from biallelic inactivation. While NF2 haploinsufficiency exists, the clinica ing ER stress in neutrophil precursors, and the affected cells are rapidly turning over hematopoietic cells, making sustained ASO delivery to the bone marrow compartment impractical.", "aso_drugs": "", "diseases": "Neutropenia", "genes": "ELANE, HAX1, G6PC3, and others", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/d20f548f-18de-44f1-8ca7-4adf57819177", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Neutropenia is a very rare blood condition that causes a reduced number or complete lack of neutrophils. Neutrophils are a type of blood cell that defends the body against bacterial infections.

ted by a germline PTEN mutation and the involvement of derivatives of all 3 germ cell layers, m"}, {"name": "RareConnect: PURA Syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "upregulation-poison-exon, upregulation-antagonat", "mutations": "missense, nonsense, frameshift, deletions, de novo", "mechanism_rationale": "Caused by heterozygous de novo mutations in PURA resulting in haploinsufficiency. One functional copy remains. If PURA has a poison exon or a natural antisense transcript, an ASO could upregulate expression from the remaining wild-type allele. This is speculative and would require identification of such regulatory elements.", "aso_drugs": "", "diseases": "PURA Syndrome", "genes": "PURA", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/20f2d8b7-359c-4882-835d-1ec45071a95c", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Mutations in PURA gene have been described to cause PURA syndrome. PURA syndrome is a rare genetic neurodevelopmental disorder characterized by severe intellectual disability (ID), epilepsy, feeding d"}, {"name": "RareConnect: Paraneoplastic Neurological syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Paraneoplastic neurological syndromes are autoimmune conditions triggered by immune responses against tumors cross-reacting with nervous system antigens. They are not monogenic disorders and are not targetable by ASOs.", "aso_drugs": "", "diseases": "Paraneoplastic Neurological syndrome", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/27674d11-1924-41b4-8806-23ed4559bc9a", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Paraneoplastic Neurological Syndromes (PNS) are a group of rare degenerative neurological disorders linked to an auto-immune response to cancer.

Source: Participating patient organizations visible be"}, {"name": "RareConnect: Paroxysmal Kinesigenic Dyskinesia (PKD)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "frameshift, nonsense, missense, truncating", "mechanism_rationale": "Autosomal dominant disorder primarily caused by loss-of-function mutations in PRRT2 (most commonly c.649dupC). The disease is well-managed with low-dose carbamazepine in most patients. The loss-of-function mechanism and effective existing treatment make ASO therapy impractical. PRRT2 haploinsufficiency would require upregulation, but no known poison exon or NAT has been characterized.", "aso_drugs": "", "diseases": "Paroxysmal Kinesigenic Dyskinesia (PKD)", "genes": "PRRT2", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/b3656aad-e729-4caf-8248-1605c19bb92c", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Familial paroxysmal kinesigenic dyskinesia is a disorder characterized by episodes of abnormal movement that range from mild to severe. In the condition name, the word paroxysmal indicates that the ab"}, {"name": "RareConnect: Paroxysmal nocturnal hemoglobinuria (PNH)", "type": "disease_specific", "aso_amenability": "Preclinical", "aso_mechanisms": "Not ASO-amenable", "mutations": "somatic loss-of-function", "mechanism_rationale": "PNH is caused by acquired somatic mutations in the X-linked PIGA gene in hematopoietic stem cells. It is not a germline monogenic disorder. The mutations are loss-of-function in clonal cell populations. ASOs cannot restore PIGA function, and complement inhibitors (eculizumab) are the standard of care.", "aso_drugs": "", "diseases": "Paroxysmal nocturnal hemoglobinuria (PNH)", "genes": "PIGA", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/715b20a2-57f0-4dc9-9641-cfa6aefdc4b3", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Paroxysmal nocturnal haemoglobinuria (PNH) is a rare disease affecting between approximately one and two people in every one million and affects both men and women at different ages. PNH is an ‘acquir"}, {"name": "RareConnect: Pediatric and Primary Lymphedema", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift", "mechanism_rationale": "Primary lymphedema is genetically heterogeneous with multiple causative genes. Most forms involve loss-of-function mutations (e.g., FLT4/VEGFR3 in Milroy disease). These are developmental/structural defects in lymphatic vasculature. ASOs cannot reverse developmental malformations or restore missing receptor function in an already-formed lymphatic system.", "aso_drugs": "", "diseases": "Pediatric and Primary Lymphedema", "genes": "FLT4, VEGFC, FOXC2, SOX18, GJC2", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/06816152-c633-40d0-8df7-87414e28d2e8", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Lymphedema is a swelling that develops as a result of an impaired lymphatic system.  Primary lymphedema is usually determined from birth and arises due to some failure of the lymphatic system itself -"}, {"name": "RareConnect: Pemphigus and Pemphigoid", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Pemphigus and pemphigoid are autoimmune blistering diseases caused by autoantibodies against desmosomal or basement membrane proteins. They are not monogenic disorders and require immunosuppressive therapy rather than genetic intervention.", "aso_drugs": "", "diseases": "Pemphigus and Pemphigoid", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/94fc1921-ecae-4544-8cfa-1a50f54118b7", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Pemphigus and pemphigoid are rare, autoimmune, blistering diseases where a person’s antibodies attack healthy skin cells instead of viruses and harmful bacteria.

rti"}, {"name": "RareConnect: Pierre Robin sequence", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "regulatory (enhancer disruptions), translocations", "mechanism_rationale": "Pierre Robin sequence is most commonly caused by disruption of long-range regulatory elements upstream of SOX9, not by coding mutations in the gene itself. It is a congenital developmental malformation (micrognathia, glossoptosis, cleft palate) that is established in utero. ASOs cannot correct structural craniofacial defects or regulatory element disruptions.", "aso_drugs": "", "diseases": "Pierre Robin sequence", "genes": "SOX9", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/ca5251ec-9815-4423-8f1c-3668776b7974", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Pierre-Robin syndrome (or Pierre-Robin sequence) is characterised by triad of orofacial morphological anomalies consisting of retrognathism, glossoptosis and a posterior median velopalatal cleft. Sour"}, {"name": "RareConnect: Pitt Hopkins syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "upregulation-poison-exon, upregulation-antagonat", "mutations": "frameshift, nonsense, splice-site, missense, deletions", "mechanism_rationale": "Caused by heterozygous loss-of-function mutations or deletions in TCF4 resulting in haploinsufficiency. One functional copy remains. ASOs that block a poison exon in TCF4 or antagonize a natural antisense transcript could upregulate expression from the intact allele. This is an active area of therapeutic ASO research for haploinsufficiency disorders affecting transcription factors.", "aso_drugs": "", "diseases": "Pitt Hopkins syndrome", "genes": "TCF4", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/573e4c77-2211-4ffd-b209-0ca5de32398b", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Pitt Hopkins Syndrome is a genetic disorder characterised by learning disabilities and developmental delay from moderate to severe, unusual breathing episodes,(apnoea and hyperventilation), epilepsy a"}, {"name": "RareConnect: Pityriasis Rubra Pilaris", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "gain-of-function missense (familial form)", "mechanism_rationale": "Most cases are sporadic with unknown etiology. Familial forms involve gain-of-function mutations in CARD14, but these are very rare. The disease is primarily inflammatory/dermatological with uncertain genetic architecture in most patients. Not well-suited for ASO therapy given heterogeneity and skin-targeting challenges.", "aso_drugs": "", "diseases": "Pityriasis Rubra Pilaris", "genes": "CARD14", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/82c2b8ab-6c7b-4b15-9e00-7f516c81bdc7", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Pityriasis rubra pilaris (PRP) is a group of rare skin disorders that cause inflammation and shedding of the skin. It will impact different parts of the body in different ways for unpredictable period"}, {"name": "RareConnect: Pontine Tegmental Cap Dysplasia", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "No causative gene has been identified. It is a congenital hindbrain malformation likely due to defective neuronal migration during embryogenesis. Even if a gene were identified, the structural brain malformation is established prenatally and cannot be reversed by ASOs.", "aso_drugs": "", "diseases": "Pontine Tegmental Cap Dysplasia", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/f58f345b-cce5-4936-8ea3-f7ef0232915e", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Pontine tegmental cap dysplasia (PTCD) is a non-progressive disorder characterized by significant developmental delay, cranial nerve dysfunction, and malformation of the hindbrain. Individuals with PT"}, {"name": "RareConnect: Porphyria", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "gene-silencing", "mutations": "missense, nonsense, frameshift, splice-site", "mechanism_rationale": "Acute hepatic porphyrias (especially AIP caused by HMBS mutations) are already being treated with the ASO givosiran, which silences ALAS1 mRNA in hepatocytes to reduce the toxic porphyrin precursors ALA and PBG. This is an upstream target knockdown approach -- the ASO does not target the mutated gene but silences a rate-limiting upstream enzyme (ALAS1) to prevent substrate accumulation.", "aso_drugs": "", "diseases": "Porphyria", "genes": "HMBS, PPOX, CPOX, UROD, FECH, ALAS2, ALAD, UROS", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/a71e8d87-a896-4375-8b51-5fafd4cd9590", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "The porphyrias are a group of eight, relatively rare, genetic disorders. In each porphyria a specific enzyme, which is needed to complete each step on the pathway to produce haem, is faulty. With all "}, {"name": "RareConnect: Postural orthostatic tachycardia syndrome (POTS)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "POTS is a dysautonomia syndrome with complex, multifactorial etiology involving autoimmune, neuropathic, and cardiovascular mechanisms. It is not a monogenic disorder and is not amenable to ASO therapy.", "aso_drugs": "", "diseases": "Postural orthostatic tachycardia syndrome (POTS)", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/66ce7902-1248-4b6d-889b-95ba4356cef1", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Postural orthostatic tachycardia syndrome (POTS) is a condition characterized by too little blood returning to the heart when moving from a lying down to a standing up position (orthostatic intoleranc"}, {"name": "RareConnect: Primary Ciliary Dyskinesia", "type": "disease_specific", "aso_amenability": "Preclinical", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift, splice-site", "mechanism_rationale": "Genetically heterogeneous autosomal recessive disorder with 50+ causative genes. All forms involve biallelic loss-of-function in ciliary structure/function genes. ASOs cannot restore missing ciliary proteins. The structural ciliary defects are not correctable at the RNA level.", "aso_drugs": "", "diseases": "Primary Ciliary Dyskinesia", "genes": "DNAH5, DNAI1, DNAH11, CCDC39, CCDC40", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/e025610b-b816-4d45-bbdd-9a6f81fd45fa", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Primary ciliary dyskinesia (PCD) is a rare disease, caused by congenital abnormalities in both structure and function of the motile cilia. It is characterized by upper and lower respiratory tract infe"}, {"name": "RareConnect: Primary Orthostatic Tremor", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Primary orthostatic tremor has no identified genetic cause. It is a rare movement disorder of unknown etiology, likely involving central oscillatory network dysfunction. Not a monogenic disorder and not targetable by ASOs.", "aso_drugs": "", "diseases": "Primary Orthostatic Tremor", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/dab60a37-5447-43df-95cf-a901026253da", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "“Primary Orthostatic tremor is a very rare progressive brain disorder often misdiagnosed as Parkinson’s. The tremor is usually five times the frequency of Parkinson’s and it is very difficult to obser"}, {"name": "RareConnect: Primary Sclerosing Cholangitis (PSC)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "PSC is a chronic cholestatic liver disease with complex polygenic and autoimmune etiology. Associated with HLA risk alleles and inflammatory bowel disease. Not a monogenic disorder and not amenable to ASO therapy.", "aso_drugs": "", "diseases": "Primary Sclerosing Cholangitis (PSC)", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/57df1b8f-9e54-4d69-92e8-58a76456a0a9", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Primary Sclerosing Cholangitis (PSC) is a rare liver disease of the bile ducts, involving an inflammation of the bile ducts (due to unknown cause)."}, {"name": "RareConnect: Primary carnitine deficiency", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift, splice-site", "mechanism_rationale": "Autosomal recessive loss-of-function in SLC22A5 encoding the OCTN2 carnitine transporter. Biallelic loss-of-function prevents carnitine uptake. ASOs cannot restore a missing transporter. The disease is effectively treated with oral carnitine supplementation.", "aso_drugs": "", "diseases": "Primary carnitine deficiency", "genes": "SLC22A5", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/0929a2c7-0702-43de-a183-2dddcbd999bf", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Systemic primary carnitine deficiency is a potentially lethal disorder of fatty acid oxidation characterized by early childhood onset cardiomyopathy often with wekness and hyoptonia, failure to thrive"}, {"name": "RareConnect: Progressive Supranuclear Palsy", "type": "disease_specific", "aso_amenability": "Clinical trial", "aso_mechanisms": "gene-silencing", "mutations": "missense (rare), H1 haplotype risk variants", "mechanism_rationale": "PSP is a tauopathy characterized by accumulation of 4R-tau neurofibrillary tangles. While rare familial cases involve MAPT mutations, most cases are sporadic associated with MAPT H1 haplotype. ASOs targeting MAPT mRNA to reduce total tau or shift the 4R/3R tau ratio are in clinical development for tauopathies (e.g., BIIB080/ISIS 814907). Gene-silencing ASO to reduce tau protein production is a validated therapeutic strategy.", "aso_drugs": "", "diseases": "Progressive Supranuclear Palsy", "genes": "MAPT", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/5a6d805e-cc48-43ba-be26-cf71b1680c7b", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Progressive supranuclear palsy (PSP) is an uncommon brain disorder that affects movement, control of walking (gait) and balance, speech, swallowing, vision, mood and behavior, and thinking. The diseas"}, {"name": "RareConnect: Propionic Acidemia", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift", "mechanism_rationale": "Autosomal recessive loss-of-function in PCCA or PCCB encoding propionyl-CoA carboxylase subunits. Biallelic loss-of-function. ASOs cannot restore the missing enzyme activity. Requires enzyme replacement, substrate reduction, or gene therapy approaches.", "aso_drugs": "", "diseases": "Propionic Acidemia", "genes": "PCCA, PCCB", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/633b67cb-d8ee-40c7-ae89-805ab9d0364b", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Propionic Acidemia or Propionic aciduria is a rare metabolic disorder characterized by deficiency of propionyl CoA carboxylase, an enzyme involved in the breakdown (catabolism) of the chemical \"buildi"}, {"name": "RareConnect: Pseudomyxoma Peritonei", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "somatic (KRAS, GNAS)", "mechanism_rationale": "Pseudomyxoma peritonei is a neoplastic condition arising from appendiceal mucinous tumors with somatic KRAS and GNAS mutations. It is not a germline monogenic disorder. Treatment is surgical (cytoreductive surgery + HIPEC). ASOs are not appropriate for this oncologic condition.", "aso_drugs": "", "diseases": "Pseudomyxoma Peritonei", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/4610b7f7-1546-4cb7-85bd-cef5ec94eb0e", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Known as PMP, pseudomyxoma peritonei is a rare cancer that generally starts in the appendix. More rarely, it can start in other parts of the bowel, the ovary or bladder and is thought to affect betwee"}, {"name": "RareConnect: Pseudoxanthoma elasticum (PXE)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, splice-site, deletions", "mechanism_rationale": "Autosomal recessive loss-of-function in ABCC6 encoding an ABC transporter. Biallelic LoF causes deficient pyrophosphate efflux and ectopic mineralization. ASOs cannot restore the missing transporter function from two mutated alleles.", "aso_drugs": "", "diseases": "Pseudoxanthoma elasticum (PXE)", "genes": "ABCC6", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/269c6be6-3d80-4c33-b845-bb46342d99d9", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "A rare, genetic, metabolic disease with connective tissue and eye involvement, characterized by progressive ectopic mineralization and fragmented elastic fibers in the skin, retina and vascular walls."}, {"name": "RareConnect: Pulmonary Fibrosis", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Pulmonary fibrosis (including idiopathic pulmonary fibrosis) is a complex multifactorial disease. While rare familial forms involve TERT, TERC, or SFTPC mutations, the disease as a category is not a single monogenic disorder. The established fibrotic process involves tissue remodeling not reversible by ASOs.", "aso_drugs": "", "diseases": "Pulmonary Fibrosis", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/ef037a4b-1f49-4e48-b019-a801123272a8", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Pulmonary fibrosis isn’t just one disease. It is a family of more than 200 different lung diseases that all look very much alike. The PF family of lung diseases falls into an even larger group of dise"}, {"name": "RareConnect: Pulmonary hypertension", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Pulmonary hypertension is a heterogeneous condition with multiple etiologies. While rare heritable forms involve BMPR2 loss-of-function mutations, the disease category as listed on RareConnect encompasses all forms. Even for BMPR2-mutant PAH, the vascular remodeling is complex and multifactorial. Not straightforwardly amenable to ASO therapy.", "aso_drugs": "", "diseases": "Pulmonary hypertension", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/ba781b7e-ca99-49d7-b767-768a417bd5ff", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Pulmonary hypertension (PH) is an increase in blood pressure in the blood vessels of the lung leading to shortness of breath, dizziness, fainting, and other symptoms, which are made worse by exertion "}, {"name": "RareConnect: Pycnodysostosis", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift", "m ified. Recent evidence argues against a simple Mendelian genetic cause. The etiology may involve autoimmune or complex genetic mechanisms. Not amenable to ASO therapy without a defined molecular target.", "aso_drugs": "", "diseases": "ROHHAD Syndrome", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/c3de046f-8dc3-4f60-9bd9-efccf6e011e1", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "A rare syndromic endocrine disease characterized by childhood-onset hyperphagia and obesity, alveolar hypoventilation, dysautonomia, hypothalamic dysfunction and neurobehavioral disorders. Central hyp"}, {"name": "RareConnect: RUNX1 FPD/AML", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "upregulation-poison-exon, upregulation-antagonat", "mutations": "frameshift, missense, nonsense, deletions", "mechanism_rationale": "Caused by heterozygous germline RUNX1 mutations resulting in haploinsufficiency or dominant-negative effects leading to thrombocytopenia and AML predisposition. For haploinsufficient alleles, ASO-mediated upregulation of the intact allele (via poison exon blocking or NAT antagonism) could restore RUNX1 levels. For dominant-negative alleles, allele-specific gene silencing of the mutant would be needed.", "aso_drugs": "", "diseases": "RUNX1 FPD/AML", "genes": "RUNX1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/b8fb4989-20f1-496f-a247-a2914bed3b8f", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "RUNX1-familial platelet disorder (RUNX1-FPD) is a hereditary blood disorder which predisposes an individual to developing blood cancer, with an approximate 50% lifetime risk. The RUNX1 gene is importa"}, {"name": "RareConnect: Recurrent Viral Meningitis (Mollaret's)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Mollaret's meningitis is typically caused by recurrent HSV-2 (or HSV-1) reactivation, not a genetic disorder. It is an infectious disease. Not amenable to ASO therapy.", "aso_drugs": "", "diseases": "Recurrent Viral Meningitis (Mollaret's)", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/8f8f8517-8bda-4ab3-9efb-6739d377bade", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Recurrent viral meningitis (Mollaret's) is a rare type of viral meningitis that is characterized by repeated episodes of fever, stiff neck (meningismus), muscle aches, and severe headaches separated b"}, {"name": "RareConnect: Refsum Disease", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift, splice-site", "mechanism_rationale": "Autosomal recessive loss-of-function in PHYH (90%+) or PEX7 causing impaired phytanic acid breakdown. Biallelic LoF. ASOs cannot restore missing peroxisomal enzyme function. The disease is managed by dietary restriction of phytanic acid.", "aso_drugs": "", "diseases": "Refsum Disease", "genes": "PHYH, PEX7", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/29749fce-5694-4ab8-9230-18929e573cf0", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Adult Refsum disease is a metabolic disorder caused by a number of faulty genes (principally PHYH) which affect the pathway that degrades a plant-derived chemical called phytol which some bacteria fou"}, {"name": "RareConnect: Relapsing polychondritis (RP)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Relapsing polychondritis is an autoimmune/inflammatory disorder targeting cartilage. It is not a monogenic disorder. The etiology involves immune-mediated destruction of cartilage, not a single gene defect.", "aso_drugs": "", "diseases": "Relapsing po ity": "Clinical trial", "aso_mechanisms": "gene-silencing", "mutations": "missense (gain-of-function and loss-of-function)", "mechanism_rationale": "SCN2A gain-of-function mutations cause early-onset epileptic encephalopathy by increasing Nav1.2 sodium channel activity and neuronal excitability. An RNase H ASO to reduce SCN2A expression could dampen excessive channel activity in the GoF subset. Note: loss-of-function SCN2A variants (causing ASD/ID without early seizures) are NOT amenable to knockdown -- those would need upregulation. The mechanism depends entirely on variant type.", "aso_drugs": "", "diseases": "SCN2A related disorders", "genes": "SCN2A", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/18cf3b67-1101-436f-a3db-ed87a1d2fc8d", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Mutations in the gene SCN2A have been identified as a prominent cause of a wide range of neurodevelopmental disorders, including autism spectrum disorder (ASD), intellectual disability (ID), and infan"}, {"name": "RareConnect: SCN8A-related epilepsy", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "gene-silencing", "mutations": "missense (gain-of-function)", "mechanism_rationale": "SCN8A gain-of-function mutations cause epileptic encephalopathy through impaired channel inactivation and elevated persistent sodium current. ASO-mediated knockdown of SCN8A mRNA to reduce Nav1.6 channel expression is a validated therapeutic strategy. Preclinical ASO programs targeting SCN8A are in development.", "aso_drugs": "", "diseases": "SCN8A-related epilepsy", "genes": "SCN8A", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/f025ab8f-f855-423e-ae26-e4b983db8711", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "SCN8A encephalopathy is a rare disorder caused by de novo missense mutations of the sodium channel gene SCN8A, which encodes the neuronal sodium channel Nav 1.6."}, {"name": "RareConnect: SPG7-related ataxia", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift", "mechanism_rationale": "Autosomal recessive loss-of-function in SPG7 encoding paraplegin, a mitochondrial metalloprotease. Biallelic LoF. ASOs cannot restore the missing mitochondrial enzyme from two defective alleles.", "aso_drugs": "", "diseases": "SPG7-related ataxia", "genes": "SPG7", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/dbe90f67-25ca-4dfb-8499-537c82b219e0", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "The sequencing of SPG7 in next-generation sequencing panels has further identified cases of spastic ataxia carrying compound heterozygous variants, supporting that SPG7 may be one of the most common f"}, {"name": "RareConnect: STXBP1 - Related disorders", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "upregulation-poison-exon, upregulation-antagonat", "mutations": "missense, frameshift, nonsense, splice-site, deletions, de novo", "mechanism_rationale": "Caused by heterozygous de novo mutations in STXBP1 resulting in haploinsufficiency. One functional copy remains but produces insufficient Munc18-1 protein for normal synaptic vesicle release. ASO-mediated upregulation of the intact allele via poison exon blocking or NAT antagonism could increase STXBP1 protein levels. This is a high-priority target for haploinsufficiency ASO strategies.", "aso_drugs": "", "diseases": "STXBP1 - Related disorders", "genes": "STXBP1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/f1c9133c-8502-46c5-9720-5128b114499f", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "\"STXBP1-related disorders comprise a spectrum of rare autosomal dominant neurodevelopmental conditions caused by changes in the STXBP1 gene. STXBP1-related epilepti ct.org/en/community/7ba06baf-cfe0-4d5a-a84a-a04fc228c88b", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Spinocerebellar ataxia, autosomal recessive type 2 (SCAR2) is a non-or-slowly progressive  spinocerebellar ataxia disorder caused by two abnormal PMPCA gene copies. Symptom onset is usually at birth o"}, {"name": "RareConnect: Spinocerebellar ataxia type 29", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "gene-silencing", "mutations": "missense (gain-of-function and loss-of-function)", "mechanism_rationale": "Autosomal dominant, caused by heterozygous missense mutations in ITPR1. Some mutations (e.g., R36C) show gain-of-function with increased IP3-binding affinity and altered Ca2+ signaling. For gain-of-function variants, allele-specific RNase H ASO knockdown of the mutant ITPR1 allele could normalize calcium signaling. Not applicable to loss-of-function variants.", "aso_drugs": "", "diseases": "Spinocerebellar ataxia type 29", "genes": "ITPR1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/7751d0ab-de78-4793-9abb-b8c6a6dea048", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Spinocerebellar ataxia type 29 (SCA29) is an autosomal dominant, non-progressive cerebellar ataxia characterized by infantile-onset hypotonia, gross motor delay and cognitive impairment. Affected indi"}, {"name": "RareConnect: Spontaneous Coronary Artery Dissection", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "SCAD has a complex genetic architecture involving multiple common risk variants and rare variants in connective tissue/extracellular matrix genes. It is not a single monogenic disorder. Up to 10% may carry rare variants with large effect, but the condition is primarily managed with cardiovascular intervention.", "aso_drugs": "", "diseases": "Spontaneous Coronary Artery Dissection", "genes ctural connective tissue defects (vitreous, cartilage, joints) are developmental and not reversible. Collagen protein is structural/extracellular, making ASO-mediated correction impractical.", "aso_drugs": "", "diseases": "Stickler syndrome", "genes": "COL2A1, COL11A1, COL11A2", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/66c9540e-6c3d-4ca9-9ebe-412a32d6eb5c", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Stickler syndrome (hereditary progressive arthro-ophthalmopathy) is a group of genetic disorders affecting connective tissue, specifically collagen."}, {"name": "RareConnect: Stiff Person Syndrome", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "", "mechanism_rationale": "Stiff person syndrome is an autoimmune disorder characterized by anti-GAD65 antibodies (or anti-amphiphysin, anti-glycine receptor). It is not a monogenic disorder. Treatment involves immunomodulation. Not amenable to ASO therapy.", "aso_drugs": "", "diseases": "Stiff Person Syndrome", "genes": "", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/6956d65a-7cb6-48c4-9f5e-b0e78ed19fd7", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Stiff-person syndrome (SPS) is a rare acquired neurological disorder characterized by progressive muscle stiffness (rigidity) and repeated episodes of painful muscle spasms.

tion of TRPS1 postnatally would have limited benefit for the structural phenotype.", "aso_drugs": "", "diseases": "Trichorhinophalangeal syndrome", "genes": "TRPS1", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/c496f49c-3ea6-442a-953e-aa43a6ed3cfa", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Trichorhinophalangeal syndromes (TRPS) **type 1 and 3** are malformation syndromes characterized by short stature, sparse hair, a bulbous nasal tip and cone-shaped epiphyses, as well as severe general"}, {"name": "RareConnect: Trimethylaminuria (TMAU)", "type": "disease_specific", "aso_amenability": "Unknown", "aso_mechanisms": "Not ASO-amenable", "mutations": "missense, nonsense, frameshift", "mechanism_rationale": "Autosomal recessive loss-of-function in FMO3 encoding flavin-containing monooxygenase 3. Biallelic LoF prevents conversion of TMA to TMAO. ASOs cannot restore the missing enzyme. Management is dietary restriction of TMA precursors.", "aso_drugs": "", "diseases": "Trimethylaminuria (TMAU)", "genes": "FMO3", "region": "Global", "country": "", "website": "https://www.rareconnect.org/en/community/db936ccb-3e5c-49b1-8a69-01a2ec2683b1", "email": "", "aso_trials": 0, "source": "rareconnect", "notes": "Trimethylaminuria or TMAU formerly called Fish Odor Syndrome, is a metabolic disorder where the body lacks enough enzyme to break down trimethylamine.
